<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitney Huston Drum Challenge</title>
    <script src="script.js" defer></script>
</head>

<body>
    <span id="info">Space to (re-)start, any other key to hit</span>
    <div id="result-output">Space to (re-)start, any other key to hit</div>

    <!-- Highscore -->
    <div id="highscore">
        <ul id="highscore-list"></ul>
        <label id="highscore-toggle-wrapper" for="highscore-toggle">
            <input type="checkbox" name="highscore-toggle" id="highscore-toggle">
            Highscore Mode
        </label>
    </div>
</body>

</html>

<style>
    *,
    body,
    html {
        margin: 0;
        padding: 0;
    }

    html {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    span#info {
        position: absolute;
        bottom: 0;
        left: 0;
        padding: 0.5em;
    }

    #result-output {
        width: 100vw;
        height: 100vh;
        display: grid;
        place-content: center;
        font-size: 10vh;
        text-align: center;
    }

    #result-output.late {
        background-color: rgb(190, 3, 3);
        color: white;
    }

    #result-output.early {
        background-color: rgb(3, 190, 75);
        color: white;
    }

    #result-output.early.way-too {
        background-color: rgb(186, 206, 6);
        color: white;
    }

    #highscore-toggle-wrapper {
        position: absolute;
        bottom: 0;
        right: 0;
        padding: 0.5em;
    }

    #highscore-list {
        position: absolute;
        right: 0;
        top: 0;
        padding: 0.5em;
        list-style: none;
    }

    li.current-score {
        font-weight: bold;
    }

    li.extra-score {
        margin-top: 1em;
    }
</style>
